document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"7c7c1d68-e661-4042-9144-36a3821937ba\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>/* ==========================================================================\n   IronVoice — Color tokens  (\"Iron Velocity\")\n   Dark mode (Obsidian) is the default :root. Light mode (Gym Stone) applies\n   under [data-theme=\"light\"] or auto + prefers light. Brand palette and\n   muscle-group palette are theme-invariant.\n   ========================================================================== */\n\n:root {\n  /* ---- Surfaces — Dark Mode (Obsidian) ---- */\n  --bg: #121212;            /* page background */\n  --surface-1: #1a1a1a;     /* lowest card surface */\n  --surface-2: #1e1e1e;     /* standard card / modal background */\n  --surface-3: #242424;     /* grouped list row / inset surface */\n  --surface-4: #2c2c2c;     /* elevated surface / input background */\n\n  --hairline: rgba(255, 255, 255, 0.07);          /* subtle dividers */\n  --hairline-strong: rgba(255, 255, 255, 0.12);   /* card borders, modal tops */\n\n  /* ---- Text / labels — Dark Mode ---- */\n  --label: #ffffff;                              /* primary — pure white */\n  --label-secondary: rgba(255, 255, 255, 0.62);  /* secondary text */\n  --label-tertiary: rgba(255, 255, 255, 0.32);   /* captions, placeholders */\n  --label-quaternary: rgba(255, 255, 255, 0.18); /* hairline text, handles */\n\n  /* ---- Brand palette (theme-invariant) ---- */\n  --gold: #ffc107;          /* Iron Gold — brand primary, ALL primary CTAs */\n  --gold-active: #e6ad00;   /* pressed state on gold surfaces */\n  --gold-ink: #1a1300;      /* dark text/icon on every gold surface */\n  --blue: #2196f3;          /* Action Blue — semantic only (steady load, update banner) */\n  --blue-tint: rgba(33, 150, 243, 0.16);\n  --orange: #ff9800;        /* Iron Orange — warmup tags, high load */\n  --green: #00e676;         /* Iron Green — ready, success, timer complete */\n  --red: #ff5252;           /* Iron Red — End Workout, destructive, overreach */\n  --purple: #9c27b0;        /* Iron Purple — arms anchor */\n\n  /* ---- Gradients ---- */\n  --gold-grad: linear-gradient(135deg, #ffc107 0%, #ff8f00 100%); /* @kind color */\n  --pr-grad: linear-gradient(135deg, #ffc107 0%, #ff8f00 100%); /* @kind color */\n  --blue-grad: linear-gradient(135deg, #2196f3 0%, #1565c0 100%); /* @kind color */\n\n  /* ---- Muscle-group palette (theme-invariant, never desaturate) ---- */\n  --m-chest: #f44336;\n  --m-back: #03a9f4;\n  --m-legs: #4caf50;\n  --m-shoulders: #ff9800;\n  --m-arms: #9c27b0;\n  --m-core: #00bcd4;\n\n  /* ---- Semantic aliases ---- */\n  --text-body: var(--label);\n  --text-muted: var(--label-secondary);\n  --text-faint: var(--label-tertiary);\n  --surface-card: var(--surface-1);\n  --surface-sheet: var(--surface-2);\n  --surface-inset: var(--surface-3);\n  --surface-input: var(--surface-3);\n  --border-card: var(--hairline);\n  --border-strong: var(--hairline-strong);\n  --accent: var(--gold);\n  --accent-ink: var(--gold-ink);\n  --accent-active: var(--gold-active);\n  --danger: var(--red);\n\n  /* ---- Mode-specific role tokens (overridden in light) ---- */\n  --heading-color: var(--gold);     /* headings glow gold on obsidian */\n  --icon-btn-bg: var(--gold);       /* header pill: gold bg, dark icon */\n  --icon-btn-color: var(--gold-ink);\n  --icon-btn-bg-active: var(--gold-active);\n\n  --frosted-bg: rgba(30, 30, 30, 0.85);\n  --header-scrolled-bg: rgba(18, 18, 18, 0.72);\n  --modal-dim: rgba(0, 0, 0, 0.55);\n}\n\n/* ==========================================================================\n   Light theme — Gym Stone (warm cream, not cool grey)\n   ========================================================================== */\n:root[data-theme=\"light\"],\n:root[data-theme=\"light\"] :root {\n  --bg: #faf7f2;\n  --surface-1: #ffffff;\n  --surface-2: #ffffff;\n  --surface-3: #faf7f2;\n  --surface-4: #e8e2d8;\n\n  --hairline: rgba(0, 0, 0, 0.12);\n  --hairline-strong: rgba(0, 0, 0, 0.22);\n\n  --label: #000000;\n  --label-secondary: rgba(0, 0, 0, 0.65);\n  --label-tertiary: rgba(0, 0, 0, 0.35);\n  --label-quaternary: rgba(0, 0, 0, 0.18);\n\n  --heading-color: var(--label);    /* headings are black on cream */\n  --icon-btn-bg: #000000;           /* header pill: black bg, gold icon */\n  --icon-btn-color: var(--gold);\n  --icon-btn-bg-active: #1a1a1a;\n\n  --frosted-bg: rgba(250, 247, 242, 0.85);\n  --header-scrolled-bg: rgba(250, 247, 242, 0.78);\n  --modal-dim: rgba(0, 0, 0, 0.30);\n}\n\n@media (prefers-color-scheme: light) {\n  :root[data-theme=\"auto\"] {\n    --bg: #faf7f2;\n    --surface-1: #ffffff;\n    --surface-2: #ffffff;\n    --surface-3: #faf7f2;\n    --surface-4: #e8e2d8;\n    --hairline: rgba(0, 0, 0, 0.12);\n    --hairline-strong: rgba(0, 0, 0, 0.22);\n    --label: #000000;\n    --label-secondary: rgba(0, 0, 0, 0.65);\n    --label-tertiary: rgba(0, 0, 0, 0.35);\n    --label-quaternary: rgba(0, 0, 0, 0.18);\n    --heading-color: var(--label);\n    --icon-btn-bg: #000000;\n    --icon-btn-color: var(--gold);\n    --icon-btn-bg-active: #1a1a1a;\n    --frosted-bg: rgba(250, 247, 242, 0.85);\n    --header-scrolled-bg: rgba(250, 247, 242, 0.78);\n    --modal-dim: rgba(0, 0, 0, 0.30);\n  }\n}\n<\u002Fstyle>\n<style>/* ==========================================================================\n   IronVoice — Typography tokens\n   System-native stack only. No web fonts: the app is offline-first with a\n   strict CSP, so it leans entirely on SF Pro (Apple) / Segoe UI / system-ui.\n   Root size is bumped to 17px for gym-floor legibility; metric values use\n   tabular-nums so weights and counts don't jitter as digits change.\n   ========================================================================== */\n\n:root {\n  /* ---- Font families ---- */\n  --font-sans: -apple-system, BlinkMacSystemFont, \"SF Pro Display\",\n               \"SF Pro Text\", \"Segoe UI\", system-ui, sans-serif;\n  --font-numeric: var(--font-sans); /* same stack, used with tabular-nums */\n\n  /* ---- Base ---- */\n  --font-root-size: 17px;     /* html font-size — whole rem scale rides this */\n  --font-feature-text: \"ss01\", \"cv11\";\n  --font-feature-num: \"tnum\", \"ss01\";\n\n  /* ---- Type scale (rem, relative to 17px root) ---- */\n  --text-h1: 2.1rem;          /* screen title \"Hi, Nick\" — weight 800 */\n  --text-display: 2.4rem;     /* hero load value — weight 800 */\n  --text-h2: 1.6rem;          /* screen-header / sheet h2 — weight 700 */\n  --text-title: 1.5rem;       /* sheet title — weight 700 */\n  --text-lg: 1.15rem;         /* 3-col sheet title — weight 700 */\n  --text-body: 1rem;          /* default body / inputs */\n  --text-sm: 0.95rem;         /* row labels, list text */\n  --text-meta: 0.88rem;       /* secondary meta, snackbar */\n  --text-caption: 0.8rem;     /* sub-labels, deltas */\n  --text-micro: 0.72rem;      /* uppercase section labels */\n  --text-nano: 0.66rem;       /* card eyebrow labels */\n  --text-tag: 0.62rem;        /* PR / warmup tags */\n\n  /* ---- Weights ---- */\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n  --weight-heavy: 800;        /* hero numbers, screen titles */\n\n  /* ---- Letter-spacing ---- */\n  --tracking-tight: -0.035em; /* big headings / hero values */\n  --tracking-snug: -0.02em;   /* titles */\n  --tracking-body: -0.01em;   /* default body */\n  --tracking-label: 0.08em;   /* uppercase section labels */\n  --tracking-eyebrow: 0.1em;  /* uppercase eyebrows */\n\n  /* ---- Line heights ---- */\n  --leading-tight: 1.05;      /* hero values */\n  --leading-snug: 1.2;\n  --leading-body: 1.35;\n  --leading-relaxed: 1.4;\n}\n<\u002Fstyle>\n<style>/* ==========================================================================\n   IronVoice — Spacing & sizing tokens\n   The app uses tight, consistent gym-floor spacing: 8–14px between cards,\n   14–18px card padding, 20px screen gutters. Hit targets are 44px (Apple\n   HIG / WCAG AA) even where the visible control is smaller.\n   ========================================================================== */\n\n:root {\n  /* ---- Spacing scale ---- */\n  --space-1: 2px;\n  --space-2: 4px;\n  --space-3: 6px;\n  --space-4: 8px;     /* default card-row gap */\n  --space-5: 10px;\n  --space-6: 12px;\n  --space-7: 14px;    /* standard card padding / card-row margin */\n  --space-8: 16px;\n  --space-9: 18px;\n  --space-10: 20px;   /* screen gutter */\n  --space-12: 24px;   /* sheet padding */\n  --space-14: 28px;   /* modal top padding */\n\n  /* ---- Layout ---- */\n  --screen-gutter: 20px;\n  --sheet-max-width: 540px;\n  --tabbar-height: 64px;      /* + env(safe-area-inset-bottom) */\n  --header-pill-size: 36px;\n  --mic-fab-size: 64px;\n  --hit-target: 44px;         /* minimum interactive target */\n}\n<\u002Fstyle>\n<style>/* ==========================================================================\n   IronVoice — Effects: radii, borders, elevation, motion\n   The brand prefers borders over shadows (\"mechanical feel\"). Heavy drop\n   shadows are reserved for floating chrome (mic FAB, search dropdown,\n   snackbar). Sheets/modals use a frosted backdrop blur.\n   ========================================================================== */\n\n:root {\n  /* ---- Corner radii ---- */\n  --radius-sm: 10px;   /* segmented controls, small chips */\n  --radius-md: 14px;   /* inputs, grouped lists, buttons */\n  --radius-lg: 20px;   /* cards */\n  --radius-xl: 28px;   /* sheet / modal top corners */\n  --radius-pill: 100px;\n  --radius-round: 50%;\n\n  /* ---- Borders (borders over shadows) ---- */\n  --border-hairline: 0.5px solid var(--hairline);\n  --border-card: 1px solid var(--hairline);\n  --border-modal-top: 1px solid var(--hairline-strong);\n\n  /* ---- Elevation — used sparingly, only on floating chrome ---- */\n  --shadow-dropdown: 0 12px 40px rgba(0, 0, 0, 0.5);\n  --shadow-snackbar: 0 8px 30px rgba(0, 0, 0, 0.45);\n  --shadow-mic:\n    0 0 0 4px var(--bg) inset,\n    0 0 0 5px rgba(255, 255, 255, 0.06) inset,\n    0 8px 24px rgba(255, 193, 7, 0.45),\n    0 2px 6px rgba(0, 0, 0, 0.5);\n  --glow-gold: 0 0 12px var(--gold);\n  --glow-green: 0 0 12px var(--green);\n\n  /* ---- Frosted blur (sheets, header, tab bar) ---- */\n  --blur-frost: blur(20px) saturate(180%); /* @kind other */\n  --blur-dropdown: blur(24px) saturate(180%); /* @kind other */\n\n  /* ---- Motion ---- */\n  --spring: cubic-bezier(0.32, 0.72, 0, 1); /* @kind other */   /* sheet slide-up, springy press */\n  --ease: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */       /* default transitions */\n  --press-scale: 0.96; /* @kind other */                        /* button:active scale */\n  --dur-fast: 0.15s; /* @kind other */\n  --dur-base: 0.2s; /* @kind other */\n  --dur-slow: 0.3s; /* @kind other */\n  --dur-sheet: 0.45s; /* @kind other */\n}\n<\u002Fstyle>\n<style>/* ==========================================================================\n   IronVoice — Base resets & document defaults\n   Applies the system font stack, obsidian background with the signature\n   faint gold radial wash, and the tabular-numeric helper. Consumers get a\n   correct canvas just by linking styles.css.\n   ========================================================================== */\n\n* {\n  box-sizing: border-box;\n  -webkit-tap-highlight-color: transparent;\n}\n\nhtml {\n  font-size: var(--font-root-size, 17px);\n}\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  background: var(--bg);\n  color: var(--label);\n  font-family: var(--font-sans);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  font-feature-settings: \"ss01\", \"cv11\";\n  letter-spacing: var(--tracking-body);\n}\n\nbody {\n  /* Signature obsidian canvas: a faint gold wash bleeding down from the top,\n     used across every IronVoice screen. */\n  background:\n    radial-gradient(1200px 600px at 50% -200px, rgba(255, 193, 7, 0.06), transparent 60%),\n    var(--bg);\n  min-height: 100vh;\n}\n\nbutton { font-family: inherit; cursor: pointer; }\ninput, select, textarea { font-family: inherit; }\n\n/* Tabular figures — apply to any metric value (weights, counts, timers). */\n.iv-tnum {\n  font-variant-numeric: tabular-nums;\n  font-feature-settings: \"tnum\", \"ss01\";\n}\n<\u002Fstyle>\n<script src=\"8d15cb97-607e-444a-962d-6f318d1cf2ba\"><\u002Fscript>\n<style>\n  body { font-family:-apple-system,BlinkMacSystemFont,\"SF Pro Display\",\"SF Pro Text\",\"Segoe UI\",system-ui,sans-serif; margin:0; }\n  @keyframes iv-wave { 0%,100%{ transform:scaleY(.3) } 50%{ transform:scaleY(1) } }\n  @keyframes iv-sheet { from{ transform:translateY(100%) } to{ transform:translateY(0) } }\n  @keyframes iv-fade { from{ opacity:0 } to{ opacity:1 } }\n  .tnum { font-variant-numeric:tabular-nums; }\n  .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }\n  .app ::-webkit-scrollbar { width:0; height:0; }\n  .scr { scrollbar-width:none; }\n  .cmd-input::placeholder { color:var(--label-tertiary); }\n  .app { --bg:#0E0F11; --surface-1:#16181B; --surface-2:#1A1D20; --surface-3:#1F2327; --surface-4:#2A2F34; --hairline:rgba(255,255,255,.07); --hairline-strong:rgba(255,255,255,.13); --label:#F4F5F6; --label-secondary:rgba(255,255,255,.6); --label-tertiary:rgba(255,255,255,.34); --label-quaternary:rgba(255,255,255,.18); --acc:#FFC107; --acc-ink:#1a1300; --frosted-bg:rgba(26,29,32,.85); --m-quads:#4caf50; --m-hamstrings:#2e9e6b; --m-glutes:#8bc34a; --m-calves:#009688; --m-biceps:#9c27b0; --m-triceps:#ba68c8; }\n  .app[data-theme=\"light\"] { --bg:#faf7f2; --surface-1:#ffffff; --surface-2:#ffffff; --surface-3:#f1ece4; --surface-4:#e7e1d7; --hairline:rgba(0,0,0,.10); --hairline-strong:rgba(0,0,0,.17); --label:#0a0a0a; --label-secondary:rgba(0,0,0,.62); --label-tertiary:rgba(0,0,0
